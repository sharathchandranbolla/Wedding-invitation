<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sharath Chandran &amp; Sowmya — Wedding Invitation</title>
<meta name="theme-color" content="#3f0d15" />
<meta name="description" content="With the blessings of our families, we invite you to the wedding of Sharath Chandran & Sowmya — 24 June 2026, Hyderabad." />

<link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)" />
<link rel="preconnect" href="[fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin />
<link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Marcellus&family=Mukta:wght@300;400;500;600&family=Tiro+Devanagari+Sanskrit&family=Tiro+Telugu&display=swap)" rel="stylesheet" />

<style>
  :root {
    --maroon: #5e1420;
    --maroon-deep: #3a0c13;
    --maroon-mid: #7a1b29;
    --gold: #c9974d;
    --gold-light: #ecca87;
    --gold-deep: #9c6f2f;
    --ivory: #fdf7ea;
    --ivory-shade: #f4ead2;
    --teal: #1f4e3d;
    --saffron: #e8a33d;
    --ink: #321c12;

    --serif-display: 'Fraunces', 'Cormorant Garamond', serif;
    --serif-classic: 'Marcellus', serif;
    --serif-body: 'Cormorant Garamond', serif;
    --sans: 'Mukta', sans-serif;
    --deva: 'Tiro Devanagari Sanskrit', serif;
    --telugu: 'Tiro Telugu', serif;

    --ease-door: cubic-bezier(.72, .02, .26, 1);
    --ease-soft: cubic-bezier(.22, 1, .36, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  ::selection { background: var(--gold); color: var(--maroon-deep); }

  html { scroll-behavior: smooth; }

  html, body {
    background: var(--maroon-deep);
    color: var(--ink);
    font-family: var(--sans);
    overflow-x: hidden;
    width: 100%;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: .01ms !important;
      scroll-behavior: auto !important;
    }
  }

  /* ============================================================
     DOOR INTRO
  ============================================================ */
  #door-screen {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 40%, #5e1420 0%, #2c080e 80%);
    perspective: 1800px;
    overflow: hidden;
  }

  .door-panel {
    position: absolute;
    top: 0;
    height: 100%;
    width: 50.5%;
    background:
      repeating-linear-gradient(0deg, transparent 0 46px, rgba(201,151,77,.10) 46px 48px),
      linear-gradient(180deg, #82202f 0%, #5e1420 48%, #380a11 100%);
    box-shadow: inset 0 0 80px rgba(0,0,0,.55);
    transition: transform 1.6s var(--ease-door), filter 1.6s var(--ease-door);
    will-change: transform;
  }
  .door-left  { left: 0;  transform-origin: left center;  border-right: 1px solid var(--gold-deep); }
  .door-right { right: 0; transform-origin: right center; border-left: 1px solid var(--gold-deep); }

  /* gold filigree frame on each door leaf */
  .door-frame {
    position: absolute;
    inset: 5% 9%;
    border: 2px solid var(--gold);
    box-shadow: inset 0 0 0 1px rgba(236,202,135,.35), inset 0 0 30px rgba(0,0,0,.4);
  }
  .door-frame::before,
  .door-frame::after {
    content: '';
    position: absolute;
    left: 14%;
    right: 14%;
    height: 34%;
    border: 1px solid rgba(201,151,77,.6);
    border-radius: 50% 50% 4px 4px / 70% 70% 4px 4px;
  }
  .door-frame::before { top: 8%; }
  .door-frame::after  { bottom: 8%; border-radius: 4px 4px 50% 50% / 4px 4px 70% 70%; }

  .door-svg {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 58%;
    max-width: 150px;
    opacity: .85;
  }
  .door-left  .door-svg { transform: translate(-50%, -50%); }

  /* brass handles meeting at the seam */
  .door-handle {
    position: absolute;
    top: 50%;
    width: 14px;
    height: 64px;
    transform: translateY(-50%);
    border-radius: 8px;
    background: linear-gradient(90deg, var(--gold-deep), var(--gold-light), var(--gold-deep));
    box-shadow: 0 2px 8px rgba(0,0,0,.5);
  }
  .door-left  .door-handle { right: 10px; }
  .door-right .door-handle { left: 10px; }

  .door-center-seam {
    position: absolute;
    top: 0; bottom: 0; left: 50%;
    width: 2px;
    transform: translateX(-50%);
    background: linear-gradient(180deg, transparent, var(--gold-light), var(--gold), var(--gold-light), transparent);
    z-index: 2;
    box-shadow: 0 0 18px rgba(236,202,135,.8);
  }

  #tap-prompt {
    position: relative;
    z-index: 3;
    text-align: center;
    color: var(--gold-light);
    cursor: pointer;
    padding: 22px;
    border-radius: 12px;
    transition: transform .4s var(--ease-soft), opacity .5s ease;
  }
  #tap-prompt:focus-visible { outline: 2px solid var(--gold-light); outline-offset: 8px; }
  #tap-prompt .om {
    font-family: var(--deva);
    font-size: clamp(48px, 14vw, 62px);
    display: block;
    color: var(--gold);
    text-shadow: 0 0 26px rgba(236,202,135,.6);
    animation: glow 3s ease-in-out infinite;
  }
  #tap-prompt .names-mini {
    font-family: var(--telugu);
    font-size: clamp(18px, 5vw, 22px);
    color: var(--ivory);
    display: block;
    margin-top: 16px;
    letter-spacing: .5px;
  }
  #tap-prompt .instruction {
    margin-top: 22px;
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--gold);
    opacity: .9;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  #tap-prompt .instruction::before,
  #tap-prompt .instruction::after {
    content: '';
    width: 26px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  #tap-prompt .instruction::after { background: linear-gradient(90deg, var(--gold), transparent); }

  .tap-pulse {
    margin: 18px auto 0;
    width: 36px; height: 36px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    position: relative;
    animation: ring 2.4s ease-out infinite;
  }
  .tap-pulse::after {
    content: '';
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    background: var(--gold-light);
  }

  @keyframes glow { 0%,100% { text-shadow: 0 0 18px rgba(236,202,135,.45); } 50% { text-shadow: 0 0 34px rgba(236,202,135,.8); } }
  @keyframes ring { 0% { box-shadow: 0 0 0 0 rgba(201,151,77,.5); } 70% { box-shadow: 0 0 0 16px rgba(201,151,77,0); } 100% { box-shadow: 0 0 0 0 rgba(201,151,77,0); } }

  body.opened #door-screen { pointer-events: none; }
  body.opened .door-left  { transform: rotateY(-105deg); filter: brightness(.4); }
  body.opened .door-right { transform: rotateY(105deg);  filter: brightness(.4); }
  body.opened .door-center-seam { opacity: 0; transition: opacity .6s; }
  body.opened #door-screen { transition: visibility 0s 1.6s; visibility: hidden; }
  body.opened #tap-prompt { opacity: 0; transform: scale(.92); }

  /* ============================================================
     CARD SHELL
  ============================================================ */
  #invite {
    position: relative;
    max-width: 600px;
    margin: 0 auto;
    background:
      radial-gradient(circle at 12% 4%, rgba(201,151,77,.10), transparent 38%),
      radial-gradient(circle at 88% 96%, rgba(31,78,61,.07), transparent 40%),
      var(--ivory);
    min-height: 100vh;
    overflow: hidden;
  }
  /* subtle paper grain */
  #invite::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: .5;
    background-image: url("data:image/svg+xml,%3Csvg xmlns='[w3.org](http://www.w3.org/2000/svg)' width='120' height='120'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.035'/%3E%3C/svg%3E");
  }

  .border-frame {
    position: fixed;
    inset: 12px;
    max-width: 576px;
    margin: 0 auto;
    border: 1.5px solid var(--gold);
    pointer-events: none;
    z-index: 4;
    box-shadow: inset 0 0 0 1px rgba(201,151,77,.35);
  }
  .border-frame .corner {
    position: absolute;
    width: 30px; height: 30px;
    stroke: var(--gold);
    fill: none;
    stroke-width: 1.4;
  }
  .border-frame .c-tl { top: -1px; left: -1px; }
  .border-frame .c-tr { top: -1px; right: -1px; transform: scaleX(-1); }
  .border-frame .c-bl { bottom: -1px; left: -1px; transform: scaleY(-1); }
  .border-frame .c-br { bottom: -1px; right: -1px; transform: scale(-1); }

  section {
    position: relative;
    padding: 58px 38px;
    text-align: center;
    z-index: 1;
  }

  .reveal { opacity: 0; transform: translateY(26px); transition: opacity 1s var(--ease-soft), transform 1s var(--ease-soft); }
  .reveal.in { opacity: 1; transform: none; }

  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 26px auto;
    color: var(--gold);
  }
  .divider::before, .divider::after {
    content: '';
    width: 56px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .divider::after { background: linear-gradient(90deg, var(--gold), transparent); }
  .divider svg { width: 16px; height: 16px; fill: var(--gold); }

  /* ============================================================
     HERO
  ============================================================ */
  #hero { padding-top: 70px; }

  .ganesha-mark { width: 92px; height: 92px; margin: 0 auto 14px; display: block; }
  .ganesha-mark path, .ganesha-mark circle, .ganesha-mark line { stroke: var(--maroon); fill: none; stroke-width: 1.6; }

  .invocation {
    font-family: var(--deva);
    font-size: 17px;
    color: var(--maroon);
    letter-spacing: .5px;
  }
  .invocation .en {
    display: block;
    font-family: var(--serif-classic);
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--teal);
    margin-top: 8px;
  }

  .eyebrow {
    margin-top: 30px;
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 18px;
    color: var(--teal);
  }

  .couple-names { margin-top: 16px; }
  .couple-names .name {
    display: block;
    font-family: var(--serif-display);
    font-weight: 600;
    font-size: clamp(34px, 9vw, 50px);
    line-height: 1.18;
    color: var(--maroon);
    letter-spacing: .5px;
  }
  .couple-names .amp {
    display: block;
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 30px;
    color: var(--gold-deep);
    margin: 4px 0;
  }
  .couple-telugu {
    margin-top: 10px;
    font-family: var(--telugu);
    font-size: 20px;
    color: var(--gold-deep);
  }

  /* kolam */
  #kolam { margin: 26px auto 8px; width: 190px; height: 190px; display: block; }
  #kolam path, #kolam circle.ring {
    fill: none; stroke: var(--gold); stroke-width: 1.5; stroke-linecap: round;
    stroke-dasharray: 1400; stroke-dashoffset: 1400;
  }
  #kolam .pulse-ring { stroke: var(--gold-light); opacity: .5; }
  body.opened #kolam path, body.opened #kolam circle.ring { animation: draw 3s var(--ease-soft) forwards; }
  #kolam .dot { fill: var(--saffron); stroke: none; opacity: 0; }
  body.opened #kolam .dot { animation: pop .5s ease forwards; }
  body.opened #kolam .dot:nth-of-type(1){ animation-delay: 2.4s; }
  body.opened #kolam .dot:nth-of-type(2){ animation-delay: 2.6s; }
  body.opened #kolam .dot:nth-of-type(3){ animation-delay: 2.8s; }
  body.opened #kolam .dot:nth-of-type(4){ animation-delay: 3s; }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  @keyframes pop { 0% { opacity: 0; transform: scale(0); } 70% { transform: scale(1.4); } 100% { opacity: 1; transform: scale(1); } }

  .blessing-line { margin-top: 18px; font-family: var(--serif-body); font-style: italic; font-size: 17px; color: var(--teal); }

  /* ============================================================
     FAMILIES
  ============================================================ */
  #families { background: linear-gradient(180deg, transparent, rgba(201,151,77,.05), transparent); }
  .family-grid { display: grid; gap: 8px; }
  .family-role {
    font-family: var(--serif-classic);
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold-deep); margin-bottom: 8px;
  }
  .family-name { font-family: var(--serif-display); font-weight: 600; font-size: 26px; color: var(--maroon); }
  .family-sub  { font-family: var(--serif-body); font-style: italic; font-size: 17px; color: var(--ink); opacity: .85; margin-top: 4px; }

  /* ============================================================
     EVENT
  ============================================================ */
  #event {
    background:
      repeating-linear-gradient(135deg, transparent 0 18px, rgba(201,151,77,.04) 18px 19px),
      linear-gradient(180deg, var(--maroon-mid), var(--maroon) 40%, var(--maroon-deep));
    color: var(--ivory);
    box-shadow: inset 0 0 60px rgba(0,0,0,.4);
  }
  #event .section-label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold-light); margin-bottom: 12px; }
  #event .divider { color: var(--gold-light); }
  #event .divider::before { background: linear-gradient(90deg, transparent, var(--gold-light)); }
  #event .divider::after  { background: linear-gradient(90deg, var(--gold-light), transparent); }
  #event .divider svg { fill: var(--gold-light); }

  .muhurtham-time {
    font-family: var(--serif-display);
    font-weight: 600;
    font-size: clamp(40px, 12vw, 54px);
    color: var(--gold-light);
    line-height: 1;
    margin: 4px 0;
    text-shadow: 0 2px 20px rgba(0,0,0,.3);
  }
  .muhurtham-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; opacity: .75; }

  .event-date { font-family: var(--serif-classic); font-size: 26px; margin-top: 22px; color: var(--ivory); }
  .event-day  { font-family: var(--serif-body); font-style: italic; font-size: 16px; opacity: .75; margin-top: 2px; }

  .venue-card {
    margin-top: 30px;
    padding: 26px 20px;
    border: 1px solid rgba(201,151,77,.45);
    border-radius: 6px;
    background: rgba(255,255,255,.035);
    backdrop-filter: blur(2px);
  }
  .venue-name { font-family: var(--serif-body); font-size: 21px; color: var(--gold-light); line-height: 1.5; }
  .venue-city { font-size: 14px; margin-top: 8px; opacity: .78; }

  .action-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 20px; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 22px;
    border: 1px solid var(--gold);
    color: var(--gold-light);
    background: transparent;
    font-family: var(--sans);
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    border-radius: 3px; text-decoration: none; cursor: pointer;
    transition: background .3s, color .3s, transform .2s;
  }
  .btn svg { width: 15px; height: 15px; fill: currentColor; }
  .btn:hover, .btn:focus-visible { background: var(--gold); color: var(--maroon-deep); }
  .btn:active { transform: scale(.97); }
  .btn:focus-visible { outline: 2px solid var(--gold-light); outline-offset: 3px; }

  /* ============================================================
     COUNTDOWN
  ============================================================ */
  #countdown-wrap { padding-top: 50px; padding-bottom: 50px; }
  .countdown-label { font-family: var(--serif-body); font-style: italic; font-size: 18px; color: var(--teal); margin-bottom: 22px; }
  #countdown { display: flex; justify-content: center; gap: clamp(8px, 3vw, 16px); }
  .cd-unit {
    background: linear-gradient(180deg, var(--ivory), var(--ivory-shade));
    border: 1px solid var(--gold);
    border-radius: 8px;
    width: clamp(60px, 18vw, 74px);
    padding: 14px 0;
    box-shadow: 0 4px 14px rgba(94,20,32,.08);
  }
  .cd-num {
    font-family: var(--serif-classic);
    font-size: clamp(24px, 7vw, 30px);
    color: var(--maroon);
    display: block;
    font-variant-numeric: tabular-nums;
    transition: transform .4s var(--ease-soft);
  }
  .cd-num.tick { transform: translateY(-3px); }
  .cd-unit-label { font-size: 9.5px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--teal); margin-top: 6px; display: block; }

  /* ============================================================
     FOOTER
  ============================================================ */
  #footer { padding-bottom: 80px; }
  .footer-line { font-family: var(--serif-body); font-style: italic; font-size: 19px; color: var(--maroon); line-height: 1.7; max-width: 400px; margin: 0 auto; }
  .footer-names { margin-top: 26px; font-family: var(--serif-display); font-weight: 600; font-size: 22px; color: var(--gold-deep); letter-spacing: 1px; }
  .footer-telugu { margin-top: 6px; font-family: var(--telugu); font-size: 16px; color: var(--teal); }

  .petal-field { position: fixed; inset: 0; pointer-events: none; z-index: 3; overflow: hidden; opacity: 0; transition: opacity 1.5s ease; }
  body.opened .petal-field { opacity: 1; }
  .petal { position: absolute; top: -6%; color: var(--saffron); opacity: .65; animation: fall linear infinite; }
  @keyframes fall { to { transform: translateY(112vh) rotate(420deg); } }

  @media (max-width: 380px) {
    section { padding: 46px 24px; }
  }
</style>
</head>
<body>

<!-- ===================== DOOR INTRO ===================== -->
<div id="door-screen" aria-hidden="false">
  <div class="door-panel door-left">
    <div class="door-frame"></div>
    <svg class="door-svg" viewBox="0 0 100 100" aria-hidden="true">
      <g stroke="#ecca87" fill="none" stroke-width="1.2" opacity=".8">
        <path d="M50 12 C70 28, 86 44, 50 50 C14 56, 30 72, 50 88 C70 72, 86 56, 50 50 C14 44, 30 28, 50 12 Z"/>
        <circle cx="50" cy="50" r="30"/>
        <circle cx="50" cy="50" r="40"/>
      </g>
    </svg>
    <div class="door-handle"></div>
  </div>
  <div class="door-panel door-right">
    <div class="door-frame"></div>
    <svg class="door-svg" viewBox="0 0 100 100" aria-hidden="true">
      <g stroke="#ecca87" fill="none" stroke-width="1.2" opacity=".8">
        <path d="M50 12 C70 28, 86 44, 50 50 C14 56, 30 72, 50 88 C70 72, 86 56, 50 50 C14 44, 30 28, 50 12 Z"/>
        <circle cx="50" cy="50" r="30"/>
        <circle cx="50" cy="50" r="40"/>
      </g>
    </svg>
    <div class="door-handle"></div>
  </div>
  <div class="door-center-seam"></div>

  <div id="tap-prompt" role="button" tabindex="0" aria-label="Tap to open the invitation">
    <span class="om">ॐ</span>
    <span class="names-mini">శరత్ చంద్రన్ &amp; సౌమ్య</span>
    <span class="instruction">Tap to open</span>
    <div class="tap-pulse" aria-hidden="true"></div>
  </div>
</div>

<div class="petal-field" id="petalField" aria-hidden="true"></div>

<div class="border-frame" aria-hidden="true">
  <svg class="corner c-tl" viewBox="0 0 30 30"><path d="M1 29 V8 Q1 1 8 1 H29"/><path d="M6 24 Q6 6 24 6"/></svg>
  <svg class="corner c-tr" viewBox="0 0 30 30"><path d="M1 29 V8 Q1 1 8 1 H29"/><path d="M6 24 Q6 6 24 6"/></svg>
  <svg class="corner c-bl" viewBox="0 0 30 30"><path d="M1 29 V8 Q1 1 8 1 H29"/><path d="M6 24 Q6 6 24 6"/></svg>
  <svg class="corner c-br" viewBox="0 0 30 30"><path d="M1 29 V8 Q1 1 8 1 H29"/><path d="M6 24 Q6 6 24 6"/></svg>
</div>

<main id="invite">

  <!-- HERO -->
  <section id="hero" class="reveal">
    <svg class="ganesha-mark" viewBox="0 0 100 100" aria-hidden="true">
      <circle cx="50" cy="50" r="44"/>
      <circle cx="50" cy="50" r="36"/>
      <path d="M50 22 C66 30, 78 40, 50 50 C22 60, 34 70, 50 78 C66 70, 78 60, 50 50 C22 40, 34 30, 50 22"/>
      <line x1="50" y1="6"
