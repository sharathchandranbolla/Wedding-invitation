<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sharath Chandran & Sowmya — The Wedding Morning</title>
  <meta name="theme-color" content="#8f5c2c" />
  <meta
    name="description"
    content="With the blessings of our families, we invite you to the wedding of Sharath Chandran & Sowmya on 24 June 2026 in Hyderabad."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Marcellus&family=Mukta:wght@300;400;500;600&family=Tiro+Devanagari+Sanskrit&family=Tiro+Telugu&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg-top: #2b1a1e;
      --bg-mid: #874c3b;
      --bg-bottom: #f4d7a1;

      --ivory: #fffaf2;
      --sand: #f5ead7;
      --sand-2: #ead8bc;
      --gold: #d7a459;
      --gold-deep: #9c6c33;
      --verm: #a94c42;
      --teal: #1f5b52;
      --ink: #3f2a20;
      --rose: #d98974;
      --shadow: rgba(60, 28, 18, 0.16);

      --display: "Fraunces", "Cormorant Garamond", serif;
      --classic: "Marcellus", serif;
      --body-serif: "Cormorant Garamond", serif;
      --sans: "Mukta", sans-serif;
      --deva: "Tiro Devanagari Sanskrit", serif;
      --telugu: "Tiro Telugu", serif;

      --ease: cubic-bezier(.22,1,.36,1);
      --ease-soft: cubic-bezier(.19,1,.22,1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 15%, rgba(255, 227, 169, .16), transparent 28%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 28%, #dfb577 52%, var(--ivory) 72%, var(--ivory) 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body.locked {
      overflow: hidden;
      height: 100vh;
    }

    img, svg {
      max-width: 100%;
      display: block;
    }

    button, a {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    .shell {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      position: relative;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 232, 183, .18), transparent 20%),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.04)),
        var(--ivory);
      box-shadow: 0 0 0 1px rgba(156,108,51,.12);
      overflow: hidden;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .28;
      background-image:
        radial-gradient(rgba(156,108,51,.10) 0.7px, transparent 0.7px);
      background-size: 12px 12px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,.5), transparent 22%, rgba(0,0,0,.35), rgba(0,0,0,.5));
    }

    .frame {
      position: fixed;
      inset: 12px;
      max-width: 656px;
      margin: 0 auto;
      pointer-events: none;
      z-index: 20;
      border: 1.5px solid rgba(215,164,89,.72);
      box-shadow: inset 0 0 0 1px rgba(255, 233, 191, .35);
    }

    .frame .corner {
      position: absolute;
      width: 30px;
      height: 30px;
      color: var(--gold);
    }

    .frame .tl { top: -1px; left: -1px; }
    .frame .tr { top: -1px; right: -1px; transform: scaleX(-1); }
    .frame .bl { bottom: -1px; left: -1px; transform: scaleY(-1); }
    .frame .br { bottom: -1px; right: -1px; transform: scale(-1); }

    .frame svg path {
      stroke: currentColor;
      fill: none;
      stroke-width: 1.4;
    }

    section {
      position: relative;
      padding: 72px 28px;
      text-align: center;
      z-index: 1;
    }

    @media (min-width: 640px) {
      section {
        padding: 84px 48px;
      }
    }

    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 1s var(--ease), transform 1s var(--ease);
    }

    .reveal.in {
      opacity: 1;
      transform: translateY(0);
    }

    .kicker {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold-deep);
      margin-bottom: 14px;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 22px auto;
      color: var(--gold);
    }

    .divider::before,
    .divider::after {
      content: "";
      width: 52px;
      height: 1px;
      background: linear-gradient(90deg, transparent, currentColor);
    }

    .divider::after {
      background: linear-gradient(90deg, currentColor, transparent);
    }

    .divider svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* INTRO */
    #intro {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 72%, rgba(255, 215, 132, .14), transparent 22%),
        linear-gradient(180deg, #1f1418 0%, #3b2325 35%, #874b3a 60%, #d7a15a 100%);
      transition: opacity 1.2s ease, visibility 1.2s ease;
    }

    #intro.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .intro-glow {
      position: absolute;
      width: 60vmin;
      height: 60vmin;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 217, 143, .18), transparent 62%);
      filter: blur(8px);
      bottom: 12vh;
      left: 50%;
      transform: translateX(-50%);
      animation: glowPulse 4s ease-in-out infinite;
    }

    .intro-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 28px;
      color: #fff3de;
      max-width: 460px;
    }

    .diya {
      width: 96px;
      height: 96px;
      margin: 0 auto 18px;
      position: relative;
    }

    .diya svg {
      width: 100%;
      height: 100%;
    }

    .flame {
      transform-origin: center bottom;
      animation: flameFlicker 1.8s ease-in-out infinite;
      filter: drop-shadow(0 0 14px rgba(255, 211, 117, .7));
    }

    .intro-mantra {
      font-family: var(--deva);
      font-size: clamp(20px, 4vw, 28px);
      color: #ffe9c2;
      letter-spacing: .4px;
    }

    .intro-sub {
      margin-top: 8px;
      font-family: var(--classic);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-size: 11px;
      color: rgba(255,243,222,.82);
    }

    .intro-names {
      margin-top: 20px;
      font-family: var(--telugu);
      font-size: clamp(18px, 4.2vw, 24px);
      color: #fff9ed;
    }

    .intro-line {
      margin: 20px auto 0;
      max-width: 300px;
      font-family: var(--body-serif);
      font-style: italic;
      font-size: 20px;
      line-height: 1.4;
      color: rgba(255, 244, 225, .92);
    }

    .begin-btn {
      margin-top: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 180px;
      padding: 13px 22px;
      border: 1px solid rgba(255, 228, 177, .9);
      color: #fff6e7;
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(4px);
      border-radius: 999px;
      cursor: pointer;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-size: 12px;
      transition: transform .25s ease, background .25s ease, color .25s ease;
    }

    .begin-btn:hover,
    .begin-btn:focus-visible {
      background: rgba(255, 232, 183, .18);
      transform: translateY(-1px);
      outline: none;
    }

    .begin-btn:active {
      transform: scale(.98);
    }

    .sun-rise {
      position: absolute;
      left: 50%;
      bottom: -22vmin;
      transform: translateX(-50%);
      width: 64vmin;
      height: 64vmin;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%, #fff1c7 0%, #efc37e 34%, rgba(239,195,126,.55) 58%, transparent 70%);
      opacity: .75;
      filter: blur(2px);
    }

    /* HERO */
    #hero {
      padding-top: 90px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 228, 170, .8), transparent 34%),
        linear-gradient(180deg, rgba(215,164,89,.08), transparent 75%);
    }

    .sun-mandala {
      width: 220px;
      height: 220px;
      margin: 0 auto 12px;
      position: relative;
    }

    .sun-mandala::before,
    .sun-mandala::after {
      content: "";
      position: absolute;
      inset: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
    }

    .sun-mandala::before {
      width: 220px;
      height: 220px;
      background:
        radial-gradient(circle, rgba(255,232,183,.75), rgba(255,232,183,.08) 48%, transparent 62%);
      animation: breathe 4s ease-in-out infinite;
    }

    .sun-mandala::after {
      width: 150px;
      height: 150px;
      border: 1px dashed rgba(215,164,89,.45);
      animation: spinSlow 20s linear infinite;
    }

    .mandala-svg {
      position: absolute;
      inset: 0;
    }

    .mandala-svg circle,
    .mandala-svg path {
      fill: none;
      stroke: rgba(215,164,89,.82);
      stroke-width: 1.3;
      stroke-linecap: round;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawLine 3.2s var(--ease-soft) forwards;
    }

    .invocation {
      font-family: var(--deva);
      font-size: 20px;
      color: var(--verm);
    }

    .invocation .en {
      display: block;
      margin-top: 8px;
      font-family: var(--classic);
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--teal);
    }

    .eyebrow {
      margin-top: 28px;
      color: var(--teal);
      font-family: var(--body-serif);
      font-size: 20px;
      font-style: italic;
    }

    .couple {
      margin-top: 16px;
    }

    .couple .name {
      display: block;
      font-family: var(--display);
      color: var(--verm);
      font-weight: 600;
      font-size: clamp(40px, 8vw, 58px);
      line-height: 1.08;
      letter-spacing: .4px;
    }

    .couple .amp {
      display: block;
      margin: 8px 0 4px;
      font-family: var(--body-serif);
      font-size: 34px;
      color: var(--gold-deep);
      font-style: italic;
    }

    .telugu-line {
      margin-top: 14px;
      font-family: var(--telugu);
      font-size: 22px;
      color: var(--gold-deep);
    }

    .hero-text {
      margin: 24px auto 0;
      max-width: 460px;
      font-family: var(--body-serif);
      font-size: 24px;
      line-height: 1.35;
      color: var(--ink);
    }

    /* BLESSING STRIP */
    #blessing {
      padding-top: 46px;
      padding-bottom: 46px;
      background:
        linear-gradient(180deg, rgba(215,164,89,.08), rgba(255,255,255,0)),
        linear-gradient(180deg, rgba(31,91,82,.03), rgba(31,91,82,0));
    }

    .icons-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      color: var(--gold-deep);
      opacity: .9;
    }

    .icons-row span {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(215,164,89,.35);
      border-radius: 50%;
      font-size: 16px;
      background: rgba(255,255,255,.54);
    }

    .blessing-copy {
      max-width: 500px;
      margin: 0 auto;
      font-family: var(--body-serif);
      font-size: 28px;
      line-height: 1.32;
      color: var(--teal);
      font-style: italic;
    }

    /* FAMILY */
    #families {
      background:
        radial-gradient(circle at 50% 50%, rgba(215,164,89,.06), transparent 45%);
    }

    .section-title {
      font-family: var(--display);
      font-size: clamp(30px, 5vw, 40px);
      color: var(--verm);
      line-height: 1.12;
    }

    .section-sub {
      margin: 14px auto 0;
      max-width: 520px;
      font-family: var(--body-serif);
      font-size: 22px;
      color: var(--ink);
      opacity: .88;
      line-height: 1.35;
    }

    .families-grid {
      margin-top: 42px;
      display: grid;
      gap: 18px;
      align-items: center;
    }

    @media (min-width: 680px) {
      .families-grid {
        grid-template-columns: 1fr auto 1fr;
        gap: 22px;
      }
    }

    .family-card {
      position: relative;
      background: linear-gradient(180deg, #fffdf8, #f8f0e2);
      border: 1px solid rgba(215,164,89,.45);
      border-radius: 22px;
      padding: 26px 22px;
      box-shadow: 0 14px 34px rgba(60,28,18,.06);
    }

    .family-card .role {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold-deep);
      margin-bottom: 10px;
    }

    .family-card .person {
      font-family: var(--display);
      font-size: 30px;
      color: var(--verm);
      font-weight: 600;
      line-height: 1.1;
    }

    .family-card .parents {
      margin-top: 10px;
      font-family: var(--body-serif);
      font-size: 22px;
      color: var(--ink);
      line-height: 1.3;
    }

    .joiner {
      display: grid;
      place-items: center;
      min-height: 100px;
      color: var(--gold);
      font-size: 28px;
    }

    .joiner svg {
      width: 72px;
      height: 72px;
    }

    /* MUHURTHAM */
    #muhurtham {
      background:
        radial-gradient(circle at 50% 24%, rgba(255, 226, 164, .25), transparent 24%),
        linear-gradient(180deg, #8e4e3b 0%, #6f392f 22%, #4f2b28 100%);
      color: #fff7e9;
      overflow: hidden;
    }

    #muhurtham .kicker,
    #muhurtham .section-sub {
      color: rgba(255,244,225,.86);
    }

    #muhurtham .section-title {
      color: #fff1cf;
    }

    .muhurtham-seal {
      margin: 26px auto 0;
      width: min(82vw, 330px);
      aspect-ratio: 1;
      border-radius: 50%;
      position: relative;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle, rgba(255,255,255,.14), rgba(255,255,255,.04) 48%, transparent 64%),
        radial-gradient(circle, rgba(244, 197, 118, .18), transparent 58%);
    }

    .muhurtham-seal::before,
    .muhurtham-seal::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      inset: 10px;
      border: 1.2px solid rgba(255, 221, 166, .65);
    }

    .muhurtham-seal::after {
      inset: 26px;
      border-style: dashed;
      opacity: .75;
    }

    .seal-rays {
      position: absolute;
      inset: -6%;
      border-radius: 50%;
      background:
        conic-gradient(from 0deg,
          rgba(255,220,161,0) 0 8deg,
          rgba(255,220,161,.22) 8deg 10deg,
          rgba(255,220,161,0) 10deg 18deg);
      filter: blur(1px);
      animation: spinSlow 26s linear infinite;
      mask: radial-gradient(circle, transparent 53%, black 54%, transparent 72%);
      opacity: .8;
    }

    .seal-content {
      position: relative;
      z-index: 2;
      padding: 24px;
    }

    .time {
      font-family: var(--display);
      font-size: clamp(46px, 10vw, 64px);
      line-height: 1;
      font-weight: 600;
      color: #ffe1a8;
      text-shadow: 0 6px 24px rgba(0,0,0,.18);
    }

    .time-label {
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,247,233,.8);
    }

    .date-line {
      margin-top: 30px;
      font-family: var(--classic);
      font-size: 28px;
      color: #fff4da;
      line-height: 1.3;
    }

    .date-sub {
      margin-top: 6px;
      font-family: var(--body-serif);
      font-style: italic;
      font-size: 19px;
      color: rgba(255,244,225,.82);
    }

    .venue-card {
      margin: 34px auto 0;
      max-width: 520px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255, 225, 171, .34);
      border-radius: 24px;
      padding: 28px 20px;
      box-shadow: inset 0 0 22px rgba(255,255,255,.03);
      backdrop-filter: blur(4px);
    }

    .venue-name {
      font-family: var(--body-serif);
      font-size: 28px;
      line-height: 1.26;
      color: #ffe8bb;
    }

    .venue-city {
      margin-top: 10px;
      font-size: 15px;
      color: rgba(255,244,225,.84);
      line-height: 1.5;
    }

    .action-row {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,228,177,.9);
      color: #fff2d4;
      background: transparent;
      font-size: 12px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .25s ease, color .25s ease, transform .2s ease;
    }

    .btn svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }

    .btn:hover,
    .btn:focus-visible {
      background: #ffe4b1;
      color: #5b2c24;
      outline: none;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: scale(.98);
    }

    /* COUNTDOWN */
    #countdown-wrap {
      background:
        linear-gradient(180deg, rgba(255, 244, 221, .8), rgba(255,255,255,0)),
        linear-gradient(180deg, rgba(31,91,82,.03), rgba(31,91,82,0));
    }

    .count-text {
      margin: 16px auto 0;
      max-width: 520px;
      font-family: var(--body-serif);
      font-size: 25px;
      line-height: 1.32;
      color: var(--teal);
    }

    .count-grid {
      margin-top: 34px;
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 14px;
      max-width: 420px;
      margin-inline: auto;
    }

    @media (min-width: 520px) {
      .count-grid {
        grid-template-columns: repeat(4, 1fr);
        max-width: 560px;
      }
    }

    .count-card {
      position: relative;
      background: linear-gradient(180deg, #fffdf9, #f4e7cf);
      border: 1px solid rgba(215,164,89,.56);
      border-radius: 22px;
      padding: 18px 12px;
      box-shadow: 0 12px 28px rgba(60,28,18,.06);
      overflow: hidden;
    }

    .count-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 230, 185, .75), transparent 40%);
      opacity: .75;
      pointer-events: none;
    }

    .count-num {
      position: relative;
      z-index: 1;
      display: block;
      font-family: var(--display);
      font-size: clamp(34px, 8vw, 42px);
      color: var(--verm);
      line-height: 1;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      transition: transform .35s ease;
    }

    .count-num.tick {
      transform: translateY(-3px);
    }

    .count-label {
      position: relative;
      z-index: 1;
      display: block;
      margin-top: 8px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--teal);
    }

    /* MESSAGE */
    #message .message-copy {
      max-width: 530px;
      margin: 20px auto 0;
      font-family: var(--body-serif);
      font-size: 27px;
      line-height: 1.42;
      color: var(--ink);
    }

    /* FOOTER */
    #footer {
      padding-bottom: 90px;
      background:
        radial-gradient(circle at 50% 0%, rgba(215,164,89,.12), transparent 35%);
    }

    .closing-line {
      max-width: 520px;
      margin: 0 auto;
      font-family: var(--body-serif);
      font-size: 28px;
      line-height: 1.4;
      color: var(--verm);
